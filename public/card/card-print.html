<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>모두의사업친구 명함 — 신주엽 대표</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #d9d9d9; }
  :root {
    --dark: #1A1A1A;      /* 브랜드 다크 (이름·라벨) */
    --orange: #FF9500;    /* 브랜드 오렌지 */
    --yellow: #FFD500;    /* 브랜드 옐로우 */
    --ink: #222222;
    --gray: #666666;
  }
  /* 표준 명함 90x50mm 비율 = 1.8:1 (원본과 동일 캔버스) */
  .card {
    position: relative;
    width: 1024px;
    height: 588px;
    background: #ffffff;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
  }
  /* ── 오른쪽 모서리 장식 도형 (브랜드 컬러: 다크 위 / 오렌지 아래) ── */
  .corner-dark {
    position: absolute;
    top: 0; right: 0;
    width: 160px; height: 100%;
    background: var(--dark);
    clip-path: polygon(0 0, 100% 0, 100% 45%, 0 68%);
    border-top-right-radius: 26px;
  }
  .corner-orange {
    position: absolute;
    bottom: 0; right: 0;
    width: 160px; height: 100%;
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    clip-path: polygon(0 68%, 100% 45%, 100% 100%, 0 100%);
    border-bottom-right-radius: 26px;
  }
  /* ── 왼쪽 로고 블록 ── */
  .logo {
    position: absolute;
    left: 82px;
    top: 50%;
    transform: translateY(-50%);
    width: 300px;
    text-align: center;
  }
  .logo img { width: 220px; height: auto; display: block; margin: 0 auto; }
  .logo .brand {
    margin-top: 20px;
    font-size: 44px;
    font-weight: 900;
    color: var(--dark);
    letter-spacing: -1px;
    white-space: nowrap;
  }
  .logo .slogan {
    margin-top: 8px;
    font-size: 17px;
    font-weight: 500;
    color: var(--gray);
    letter-spacing: -0.9px;
    white-space: nowrap;
  }

  /* ── 오른쪽 텍스트 블록 ── */
  .info {
    position: absolute;
    left: 486px;
    right: 190px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink);
  }
  .name {
    font-size: 62px;
    font-weight: 900;
    color: var(--dark);
    line-height: 1;
    text-align: right;
    letter-spacing: 2px;
  }
  .title {
    margin-top: 12px;
    font-size: 23px;
    font-weight: 500;
    color: var(--ink);
    text-align: right;
    letter-spacing: 0.5px;
  }
  .divider {
    margin: 22px 0 20px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--yellow) 30%, var(--orange));
    border-radius: 3px;
  }
  .contact { font-size: 23px; line-height: 1.55; color: var(--ink); }
  .contact .label { font-weight: 700; color: var(--orange); }
  .contact .row { white-space: nowrap; }
  .contact .addr { display: flex; }
  .contact .addr .addr-text { display: inline-block; }
  .gap { display: inline-block; width: 22px; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="corner-dark"></div>
    <div class="corner-orange"></div>

    <div class="logo">
      <img src="./modu-logo.png" alt="모두의사업친구 로고" />
      <div class="brand">모두의사업친구</div>
      <div class="slogan">정부지원사업 AI 통합 매칭 플랫폼</div>
    </div>

    <div class="info">
      <div class="name">신주엽</div>
      <div class="title">모두의사업친구 &nbsp;|&nbsp; 대표</div>
      <div class="divider"></div>
      <div class="contact">
        <div class="row">
          <span class="label">T.</span> 1551-7886<span class="gap"></span><span class="label">F.</span> 010-3032-9388
        </div>
        <div class="row">
          <span class="label">E.</span> biospartners@naver.com
        </div>
        <div class="row">
          <span class="label">W.</span> 모두의사업친구.kr
        </div>
        <div class="addr">
          <span class="label" style="margin-right:8px;">P.</span>
          <span class="addr-text">인천 서구 청라커낼로 288번길<br />26, 청라썬앤빌더테라스 285호</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
